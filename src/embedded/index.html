<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Tester Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>Server Tester Dashboard</h1>
        <button id="btn-add" class="btn btn-primary">+ Add Server</button>
    </header>

    <main id="server-list">
        <p class="empty-state">No servers yet. Click "+ Add Server" to create one.</p>
    </main>

    <!-- Add / Edit Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Add Server</h2>
                <button id="modal-close" class="btn-icon">&times;</button>
            </div>
            <form id="server-form">
                <input type="hidden" id="form-id" value="">
                <div class="form-group">
                    <label for="form-name">Name</label>
                    <input type="text" id="form-name" required placeholder="e.g. web-1">
                </div>
                <div class="form-group">
                    <label for="form-port">Port</label>
                    <input type="number" id="form-port" required min="1024" max="65535" placeholder="e.g. 8001">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="form-http-status">HTTP Status Code</label>
                        <input type="number" id="form-http-status" value="200" min="100" max="599">
                    </div>
                    <div class="form-group">
                        <label for="form-delay">Response Delay (ms)</label>
                        <input type="number" id="form-delay" value="0" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label for="form-title">HTML Title</label>
                    <input type="text" id="form-title" placeholder="Page title in browser tab">
                </div>
                <div class="form-group">
                    <label for="form-body">Response Body (optional HTML)</label>
                    <textarea id="form-body" rows="3" placeholder="Leave empty for auto-generated page"></textarea>
                </div>
                <div class="form-group">
                    <label for="form-headers">Custom Headers (JSON object, optional)</label>
                    <input type="text" id="form-headers" placeholder='{"X-Custom": "value"}'>
                </div>
                <div class="form-actions">
                    <button type="button" id="btn-cancel" class="btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
