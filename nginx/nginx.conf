worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Upstream pool of virtual servers.
    # Add/remove entries to match the virtual servers you create via the management API.
    upstream backend_pool {
        server server-tester:8001;
        server server-tester:8002;
        server server-tester:8003;
    }

    # Load-balanced virtual servers
    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://backend_pool;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for testing failure scenarios
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_send_timeout 5s;

            # Failover: try next backend on connection error, timeout, or 503
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 2;
        }
    }
}
