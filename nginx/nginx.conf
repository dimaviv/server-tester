worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Map subdomain to backend port.
    # s1-s20.uran3.shop → ports 8001-8020 (virtual test servers)
    # dashboard.uran3.shop → port 3000 (management UI)
    #
    # This enables Cloudflare Proxied mode (orange cloud) since all traffic
    # arrives on port 80 and nginx routes to the correct backend port.
    # For DNS-only (grey cloud) testing, access ports 8011-8020 directly.
    map $host $backend_port {
        s1.uran3.shop   8001;
        s2.uran3.shop   8002;
        s3.uran3.shop   8003;
        s4.uran3.shop   8004;
        s5.uran3.shop   8005;
        s6.uran3.shop   8006;
        s7.uran3.shop   8007;
        s8.uran3.shop   8008;
        s9.uran3.shop   8009;
        s10.uran3.shop  8010;
        s11.uran3.shop  8011;
        s12.uran3.shop  8012;
        s13.uran3.shop  8013;
        s14.uran3.shop  8014;
        s15.uran3.shop  8015;
        s16.uran3.shop  8016;
        s17.uran3.shop  8017;
        s18.uran3.shop  8018;
        s19.uran3.shop  8019;
        s20.uran3.shop  8020;
        dashboard.uran3.shop 3000;
        default              3000;
    }

    # Subdomain-based routing for Cloudflare proxied mode
    server {
        listen 80;
        server_name *.uran3.shop;

        location / {
            proxy_pass http://server-tester:$backend_port;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for testing failure scenarios
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_send_timeout 5s;
        }
    }

    # Fallback for direct IP access → management dashboard
    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://server-tester:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
