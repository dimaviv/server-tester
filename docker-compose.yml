services:
  server-tester:
    build: .
    container_name: server-tester
    ports:
      - "3000:3000"
      - "8001-8020:8001-8020"
    volumes:
      - server-data:/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server-tester
    restart: unless-stopped

volumes:
  server-data:
